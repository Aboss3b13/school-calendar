name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Generate Android project
        env:
          CI: 1
        run: npx expo prebuild --platform android

      - name: Build release APK
        run: |
          cd android
          ./gradlew assembleRelease -PreactNativeArchitectures=arm64-v8a --no-daemon

      - name: Prepare APK asset
        id: release_meta
        run: |
          VERSION_TAG="v1.${GITHUB_RUN_NUMBER}"
          APK_NAME="SchoolFlow-Planner-${VERSION_TAG}.apk"
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk "dist/${APK_NAME}"
          echo "release_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"
          echo "apk_name=${APK_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SchoolFlow-Planner-apk-${{ steps.release_meta.outputs.release_tag }}
          path: dist/${{ steps.release_meta.outputs.apk_name }}

      - name: Publish to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.release_meta.outputs.release_tag }}
          name: SchoolFlow APK ${{ steps.release_meta.outputs.release_tag }}
          allowUpdates: true
          artifacts: dist/${{ steps.release_meta.outputs.apk_name }}
          body: |
            Auto-generated Android APK from the latest main branch commit.
            File: ${{ steps.release_meta.outputs.apk_name }}
